usb_camera_node:
  ros__parameters:
    device_path: "/dev/v4l/by-path/platform-xhci-hcd.2.auto-usb-0:1.1:1.0-video-index0"
    camera_index: 0
    frame_id: camera_link
    output_topic: /camera/image_raw
    width: 640
    height: 480
    fps: 30
    use_mjpeg: true
    reopen_on_failure: true
    reopen_delay_ms: 1000

yolo_detector_node:
  ros__parameters:
    image_topic: /camera/image_raw
    detections_topic: /vision/detections_json
    annotated_topic: /vision/image_annotated
    backend_type: rdk
    model_path: ""
    input_width: 640
    input_height: 640
    pad_value: 114
    use_letterbox: true
    score_threshold: 0.35
    nms_threshold: 0.45
    publish_annotated: true
    inference_period_ms: 60
    class_names: [
      "table", "coke", "water", "motorcycle", "airplane", "bus", "train", "truck", "boat", "traffic light",
      "fire hydrant", "stop sign", "parking meter", "bench", "bird", "cat", "dog", "horse", "sheep", "cow",
      "elephant", "bear", "zebra", "giraffe", "backpack", "umbrella", "handbag", "tie", "suitcase", "frisbee",
      "skis", "snowboard", "sports ball", "kite", "baseball bat", "baseball glove", "skateboard", "surfboard", "tennis racket", "bottle",
      "wine glass", "cup", "fork", "knife", "spoon", "bowl", "banana", "apple", "sandwich", "orange",
      "broccoli", "carrot", "hot dog", "pizza", "donut", "cake", "chair", "couch", "potted plant", "bed",
      "dining table", "toilet", "tv", "laptop", "mouse", "remote", "keyboard", "cell phone", "microwave", "oven",
      "toaster", "sink", "refrigerator", "book", "clock", "vase", "scissors", "teddy bear", "hair drier", "toothbrush"
      ]

 


object_on_plane_node:
  ros__parameters:
    detections_topic: /vision/detections_json
    object_on_plane_topic: /perception/object_on_plane
    target_frame: base_link
    homography: [0.001, 0.0, -0.32, 0.0, 0.001, -0.24, 0.0, 0.0, 1.0]
    min_confidence: 0.35
    target_class: ""

plane_calibration_node:
  ros__parameters:
    laser_range_topic: /perception/laser_range
    plane_height_topic: /perception/plane_height
    calibration_file: /home/sunrise/my_ros/src/robot_vision/config/plane_height_calibration.json
    frame_id: base_link
    z_sensor_in_base: 0.12
    laser_tilt_rad: 0.0
    min_valid_range_m: 0.02
    max_valid_range_m: 2.0
    auto_calibrate_on_first_range: false
