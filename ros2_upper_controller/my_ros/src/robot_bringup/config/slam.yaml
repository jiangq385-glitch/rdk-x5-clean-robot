slam_toolbox:
  ros__parameters:
    # 使用模式：建图
    mode: mapping
    
    # 坐标系
    odom_frame: odom
    map_frame: map
    base_frame: base_link

    # 经过 scan_resampler 统一成固定长度后，再送入 slam_toolbox
    scan_topic: /scan_fixed

    # 参考配置：跳帧处理（1 表示不跳帧）
    throttle_scans: 1
    
    # 雷达参数：对应 lslidar_driver 的 N10 配置
    max_laser_range: 20.0        # 雷达最大量程，米
    min_laser_range: 0.19       # 略低于标称最小量程，避免边界告警
    
    # 地图分辨率
    resolution: 0.03        # 4cm/格
    
    # 关键参数：你的差速底盘里程计精度
    # 如果里程计准，信任度高；如果漂移大，降低
    use_scan_matching: true
    use_scan_barycenter: true
    
    # 回环检测
    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # 参考配置：显式开启回环
    do_loop_closing: true

    # 参考配置：更细粒度回环匹配阈值
    link_match_minimum_response_fine: 0.1
    
    # 扫描匹配
    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1
    
    # 里程计权重（你的编码器里程计）
    minimum_travel_distance: 0.05   # 移动约 5cm 才处理一帧
    minimum_travel_heading: 0.05    # 转约 3deg(≈0.052rad) 才处理
    
    # 扫描缓冲区（增大以减少消息丢失）
    scan_buffer_size: 15
    scan_queue_size: 50                # 本参数用于增大处理队列，若 slam_toolbox 无此参数则会被忽略
    scan_buffer_maximum_scan_distance: 20.0
    
    # 地图更新
    map_update_interval: 2.0
    
    # 发布静态地图
    publish_period_sec: 1.0